name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          npm ci
          npm ci --prefix frontend
          npm run build:frontend

      - name: Stage frontend assets
        run: |
          rm -rf atto/frontend-dist
          mkdir -p atto/frontend-dist
          cp -R frontend/dist/. atto/frontend-dist/

      - name: Build wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
