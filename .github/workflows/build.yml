name: Build and Release
permissions:
  contents: read
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (must match package.json)'
        required: true
        type: string
      skip_release:
        description: 'Skip creating a GitHub Release (build only)'
        required: false
        type: boolean
        default: false
  release:
    types:
      - published

jobs:
  validate_and_build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Version
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          INPUT_VERSION="${{ github.event.inputs.version }}"

          if [ "$PACKAGE_VERSION" != "$INPUT_VERSION" ]; then
            echo "[ERROR] Version mismatch!"
            echo "The package.json says $PACKAGE_VERSION but you entered $INPUT_VERSION."
            exit 1
          fi
        shell: bash

      - name: Validate Release Tag Version
        if: ${{ github.event_name == 'release' }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          RELEASE_VERSION="${RELEASE_TAG#v}"

          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "[ERROR] Version mismatch!"
            echo "The package.json says $PACKAGE_VERSION but release tag is $RELEASE_TAG."
            exit 1
          fi
        shell: bash

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          npm ci
          npm ci --prefix frontend
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install ./backend
        shell: bash

      - name: Build
        run: npm run dist
        shell: bash

      - name: Rename
        run: |
          shopt -s nocaseglob
          for f in dist/atto*; do
            if [ -f "$f" ]; then
              ext="${f##*.}"
              filename="${f%.*}"
              if [ "$ext" = "$filename" ] || [ "$f" = "$filename" ]; then
                mv "$f" "${f}-${{ matrix.os }}"
              else
                mv "$f" "${filename}-${{ matrix.os }}.${ext}"
              fi
            fi
          done
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atto-binaries-${{ matrix.os }}
          path: dist/
          retention-days: 5

  release:
    runs-on: ubuntu-latest
    needs: validate_and_build
    if: ${{ github.event_name == 'release' || github.event.inputs.skip_release == 'false' }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: atto-binaries-ubuntu-latest
          path: artifacts/ubuntu

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: atto-binaries-windows-latest
          path: artifacts/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: atto-binaries-macos-latest
          path: artifacts/macos

      - name: Create Release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          files: artifacts/**
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts To Existing Release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Post Release
        if: success()
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="v${{ github.event.inputs.version }}"
          fi
          echo "Release ${TAG} processed successfully."
          echo "View Release Page: https://github.com/AustinKong/atto/releases/tag/${TAG}"

  publish_pypi:
    name: Publish desktop package to PyPI
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate release tag matches Python package versions
        run: |
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          RELEASE_VERSION="${RELEASE_TAG#v}"
          SHARED_VERSION=$(python -c "import tomllib; print(tomllib.load(open('shared/pyproject.toml','rb'))['project']['version'])")
          BACKEND_VERSION=$(python -c "import tomllib; print(tomllib.load(open('backend/pyproject.toml','rb'))['project']['version'])")

          if [ "$SHARED_VERSION" != "$RELEASE_VERSION" ]; then
            echo "[ERROR] shared package version mismatch!"
            echo "shared/pyproject.toml version is $SHARED_VERSION but release tag is $RELEASE_TAG."
            exit 1
          fi

          if [ "$BACKEND_VERSION" != "$RELEASE_VERSION" ]; then
            echo "[ERROR] backend package version mismatch!"
            echo "backend/pyproject.toml version is $BACKEND_VERSION but release tag is $RELEASE_TAG."
            exit 1
          fi
        shell: bash

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix frontend
          python -m pip install --upgrade pip
          python -m pip install build
        shell: bash

      - name: Build frontend
        run: npm run build:frontend
        shell: bash

      - name: Bundle frontend into backend package
        run: |
          rm -rf backend/app/frontend_dist
          mkdir -p backend/app/frontend_dist
          cp -R frontend/dist/. backend/app/frontend_dist/
        shell: bash

      - name: Prepare Python package metadata
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          release_version = os.environ['RELEASE_VERSION'].removeprefix('v')
          backend_pyproject_path = Path('backend/pyproject.toml')
          content = backend_pyproject_path.read_text()
          updated, replacement_count = re.subn(
            r'^\s*"shared\s*@\s*file:\.\./shared",\s*$',
            f'  "shared=={release_version}",',
            content,
            flags=re.MULTILINE,
          )

          if replacement_count != 1:
            raise RuntimeError('Could not update shared dependency in backend/pyproject.toml')

          backend_pyproject_path.write_text(updated)
          PY
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name }}

      - name: Build Python packages
        run: |
          python -m build shared --outdir dist/pypi
          python -m build backend --outdir dist/pypi
        shell: bash

      - name: Publish packages to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi
