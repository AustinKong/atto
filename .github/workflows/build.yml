name: Build and Release
permissions:
  contents: write
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (must match package.json)'
        required: true
        type: string
      skip_release:
        description: 'Skip creating a GitHub Release (build only)'
        required: false
        type: boolean
        default: false

jobs:
  validate_and_build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          INPUT_VERSION="${{ github.event.inputs.version }}"

          if [ "$PACKAGE_VERSION" != "$INPUT_VERSION" ]; then
            echo "[ERROR] Version mismatch!"
            echo "The package.json says $PACKAGE_VERSION but you entered $INPUT_VERSION."
            exit 1
          fi
        shell: bash

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          npm ci
          npm ci --prefix frontend
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install ./shared
          cd backend
          python -m pip install .
        shell: bash

      - name: Build
        run: npm run dist
        shell: bash

      - name: Rename
        run: |
          set -euo pipefail

          case "${{ matrix.os }}" in
            ubuntu-latest)
              if [ -f dist/Atto ]; then
                mkdir -p /tmp/atto-linux
                cp dist/Atto /tmp/atto-linux/Atto
                chmod +x /tmp/atto-linux/Atto
                cp website/src/icons/logo.svg /tmp/atto-linux/atto.svg
                printf '%s\n' \
                  '#!/usr/bin/env bash' \
                  'set -euo pipefail' \
                  'APP_DIR="$(cd "$(dirname "$0")" && pwd)"' \
                  'APP_FILE="$HOME/.local/share/applications/atto.desktop"' \
                  'ICON_DIR="$HOME/.local/share/icons/hicolor/scalable/apps"' \
                  'mkdir -p "$(dirname "$APP_FILE")" "$ICON_DIR"' \
                  'cp "$APP_DIR/atto.svg" "$ICON_DIR/atto.svg"' \
                  'sed "s|^Exec=.*|Exec=\"$APP_DIR/Atto\"|" "$APP_DIR/Atto.desktop" > "$APP_FILE"' \
                  'chmod +x "$APP_FILE"' \
                  'echo "Installed Atto launcher to $APP_FILE"' \
                  > /tmp/atto-linux/install.sh
                chmod +x /tmp/atto-linux/install.sh
                printf '%s\n' \
                  '[Desktop Entry]' \
                  'Type=Application' \
                  'Name=Atto' \
                  'Exec=Atto' \
                  'Icon=atto' \
                  'Terminal=true' \
                  'Categories=Office;' \
                  > /tmp/atto-linux/Atto.desktop
                tar -czf dist/atto-linux.tar.gz -C /tmp atto-linux
                rm -f dist/Atto
              else
                echo "Expected Linux artifact dist/Atto was not found."
                ls -la dist
                exit 1
              fi
              ;;
            windows-latest)
              if [ -f dist/Atto.exe ]; then
                mv -f dist/Atto.exe dist/atto-windows.exe
              else
                echo "Expected Windows artifact dist/Atto.exe was not found."
                ls -la dist
                exit 1
              fi
              ;;
            *)
              echo "Unknown OS: ${{ matrix.os }}"
              exit 1
              ;;
          esac
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atto-binaries-${{ matrix.os }}
          path: dist/atto-*
          retention-days: 5

  release:
    runs-on: ubuntu-latest
    needs: validate_and_build
    if: ${{ github.event.inputs.skip_release == 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: atto-binaries-ubuntu-latest
          path: artifacts/ubuntu

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: atto-binaries-windows-latest
          path: artifacts/windows

      - name: Create Release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          files: artifacts/**
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Post Release
        if: success()
        run: |
          echo "Release v${{ github.event.inputs.version }} created successfully."
          echo "View Release Page: https://github.com/AustinKong/atto/releases/tag/v${{ github.event.inputs.version }}"
